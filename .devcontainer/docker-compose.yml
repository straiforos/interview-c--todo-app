services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: sleep infinity
    volumes:
      - ..:/workspace:cached
    depends_on:
      - db
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=taskdb;Username=postgres;Password=postgres
      - Jwt__Key=DevelopmentSecretKey_ChangeThisInProduction_MustBeLongEnough
      - Jwt__Issuer=TaskFlowApp
      - Jwt__Audience=TaskFlowApp

  ui:
    image: node:24-slim
    command: sh -c "cd /workspace/TaskManagement.Client && npm install && npm run dev -- --host"
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace/TaskManagement.Client
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - app

  db:
    image: postgres:18-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=taskdb
