services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    command: bash /workspace/.devcontainer/start-api.sh
    depends_on:
      - db
    volumes:
      - ..:/workspace:cached
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=taskdb;Username=postgres;Password=postgres
      - Jwt__Key=DevelopmentSecretKey_ChangeThisInProduction_MustBeLongEnough
      - Jwt__Issuer=TaskFlowApp
      - Jwt__Audience=TaskFlowApp
      - Jwt__ExpiryInMinutes=60
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000

  ui:
    image: node:24-slim
    command: bash /workspace/.devcontainer/start-ui.sh
    network_mode: service:app
    depends_on:
      - app
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace/TaskManagement.Client
    environment:
      - VITE_API_URL=http://localhost:5000/api

  db:
    image: postgres:18-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=taskdb
