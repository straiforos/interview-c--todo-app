services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: sleep infinity
    volumes:
      - ..:/workspace:cached
    network_mode: service:db
    depends_on:
      - db
    environment:
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection:-Host=db;Database=taskdb;Username=postgres;Password=postgres}
      - Jwt__Key=${Jwt__Key:-DevelopmentSecretKey_ChangeThisInProduction_MustBeLongEnough}
    env_file:
      - path: ../TaskManagement.Api/.env.development
        required: false

  db:
    image: postgres:18-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=taskdb
    ports:
      - "5433:5432"
